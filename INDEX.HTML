<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadi Pro AI 🤖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: #131314; color: #e3e3e3; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { padding: 20px; font-size: 1.5rem; font-weight: 600; color: #8ab4f8; text-align: left; margin-left: 20px; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .message { display: flex; gap: 15px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .user-avatar { background: #4b4b4b; }
        .ai-avatar { background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570); }
        
        .text { line-height: 1.6; font-size: 1rem; max-width: 90%; }
        .user-text { color: #e3e3e3; }
        .ai-text { color: #e3e3e3; white-space: pre-wrap; }

        /* Input Area */
        .input-wrapper { padding: 20px; background: #131314; position: sticky; bottom: 0; }
        .input-box { max-width: 800px; margin: 0 auto; position: relative; background: #1e1f20; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid transparent; transition: 0.3s; }
        .input-box:focus-within { border-color: #4b4b4b; background: #28292a; }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 1rem; outline: none; }
        button { background: none; border: none; cursor: pointer; color: #8ab4f8; font-weight: bold; padding: 10px; border-radius: 50%; transition: 0.2s; }
        button:hover { background: #3c4043; }

        /* Typing Animation */
        .dots { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: #8ab4f8; border-radius: 50%; animation: bounce 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>Hadi Pro AI</header>

    <div id="chat-container">
        <div class="message">
            <div class="avatar ai-avatar">H</div>
            <div class="text ai-text">Assalam-o-Alaikum! Main Hadi Pro AI hoon. Main aapki kya madad kar sakta hoon?</div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Hadi se kuch pucho..." autocomplete="off">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // User Message
            addMessage(text, 'user');
            userInput.value = '';

            // AI Typing
            const loadingId = addLoading();

            try {
                // Free Model for testing (Hugging Face)
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: text })
                });
                
                const data = await response.json();
                const aiResponse = data.generated_text || data[0]?.generated_text || "Maaf karna, main abhi seekh raha hoon!";
                
                removeLoading(loadingId);
                addMessage(aiResponse, 'ai');
            } catch (error) {
                removeLoading(loadingId);
                addMessage("Internet ka masla hai, dobara try karein.", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = 'message';
            const avatarClass = sender === 'user' ? 'user-avatar' : 'ai-avatar';
            const avatarInitial = sender === 'user' ? 'A' : 'H';
            
            div.innerHTML = `
                <div class="avatar ${avatarClass}">${avatarInitial}</div>
                <div class="text ${sender}-text">${text}</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.className = 'message';
            div.id = id;
            div.innerHTML = `
                <div class="avatar ai-avatar">H</div>
                <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
